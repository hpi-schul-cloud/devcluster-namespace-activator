name: wtf

on:
  push:
    branches:
      - '*'
    tags:
      - '*'
  workflow_dispatch:
  create:
    tags:
      - '*'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "Build:checkout"
        uses: actions/checkout@v4
      - name: "Extract git ref"
        id: extract_ref
        shell: bash
        run: echo "git_ref_name=$(echo ${GITHUB_REF##*/})" >> $GITHUB_ENV
      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: 24
          distribution: temurin
          cache: maven
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: "build image"
        id: build_image
        shell: bash
        run:  docker run --rm -d --name web docker.io/nginx; minikube status || true; sleep 60; minikube status  || true; kubectl get ns